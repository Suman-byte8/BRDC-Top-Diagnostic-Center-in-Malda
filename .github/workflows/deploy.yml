name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏗️ Build and Export Project
        run: npm run deploy

      - name: 🚀 Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /
          protocol: sftp          # SFTP is more reliable than FTPS on Hostinger
          port: 22
          timeout: 60000          # Increased timeout to prevent socket timeouts
          security: loose         # Accepts self-signed certs (common on shared hosts)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .ftp-deploy-sync-state.json
            **/__next/**
            **/__*.**
            **/404.php
